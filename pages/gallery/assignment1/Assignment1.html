<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Menu - Assignment 1</title>
    <link rel="stylesheet" href="../../styles/main.css" />
    <link rel="stylesheet" href="../../styles/navigation.css" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      .menu-container {
        max-width: 900px;
        margin: 50px auto;
        padding: 40px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .restaurant-header {
        text-align: center;
        margin-bottom: 40px;
        padding-bottom: 30px;
        border-bottom: 3px solid #667eea;
      }

      .restaurant-header h1 {
        color: #667eea;
        font-size: 3em;
        margin: 0 0 10px 0;
      }

      .restaurant-status {
        display: inline-block;
        padding: 8px 20px;
        border-radius: 20px;
        font-weight: 600;
        margin-top: 10px;
      }

      .restaurant-status.open {
        background: #4caf50;
        color: white;
      }

      .restaurant-status.closed {
        background: #f44336;
        color: white;
      }

      .welcome-section {
        background: #f8f9fa;
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 30px;
        text-align: center;
      }

      .welcome-section input {
        padding: 12px 20px;
        border: 2px solid #667eea;
        border-radius: 8px;
        font-size: 1em;
        margin-right: 10px;
        min-width: 250px;
      }

      .welcome-section button {
        padding: 12px 25px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .welcome-section button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }

      .greeting-display {
        margin-top: 20px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        font-size: 1.2em;
        color: #667eea;
        font-weight: 600;
      }

      .menu-section {
        margin-top: 40px;
      }

      .menu-section h2 {
        color: #667eea;
        font-size: 2em;
        margin-bottom: 20px;
        text-align: center;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .menu-item {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        border: 2px solid transparent;
        transition: all 0.3s;
      }

      .menu-item:hover {
        border-color: #667eea;
        transform: translateY(-5px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      }

      .menu-item h3 {
        color: #667eea;
        margin: 0 0 10px 0;
        font-size: 1.3em;
      }

      .menu-item-price {
        font-size: 1.2em;
        font-weight: 700;
        color: #4caf50;
        margin: 10px 0;
      }

      .menu-item-badge {
        display: inline-block;
        background: #4caf50;
        color: white;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 0.85em;
        font-weight: 600;
      }

      .order-section {
        background: #e3f2fd;
        padding: 25px;
        border-radius: 12px;
        margin-top: 30px;
      }

      .order-section h2 {
        color: #1976d2;
        margin-top: 0;
      }

      .calculator {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 15px;
        margin-bottom: 20px;
        align-items: end;
      }

      .calculator input {
        padding: 12px;
        border: 2px solid #2196f3;
        border-radius: 8px;
        font-size: 1em;
      }

      .calculator button {
        padding: 12px 25px;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .calculator button:hover {
        background: #1976d2;
        transform: translateY(-2px);
      }

      .calculator-result {
        margin-top: 15px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        font-size: 1.3em;
        font-weight: 600;
        color: #1976d2;
        text-align: center;
      }

      .error-message {
        background: #fff3cd;
        border: 2px solid #ffc107;
        color: #856404;
        padding: 20px;
        border-radius: 12px;
        margin: 20px 0;
        text-align: center;
      }

      .error-message h3 {
        margin-top: 0;
        color: #856404;
      }

      .back-link {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        background: #f0f0f0;
        color: #333;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .back-link:hover {
        background: #e0e0e0;
      }

      .info-tables {
        margin-top: 20px;
        text-align: center;
        color: #666;
        font-size: 0.95em;
      }

      @media (max-width: 768px) {
        .menu-container {
          margin: 20px;
          padding: 20px;
        }

        .restaurant-header h1 {
          font-size: 2em;
        }

        .calculator {
          grid-template-columns: 1fr;
        }

        .welcome-section input {
          min-width: 100%;
          margin-bottom: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="menu-container">
      <div class="restaurant-header">
        <h1 id="restaurantName">🍽️ Loading...</h1>
        <div id="restaurantStatus" class="restaurant-status">Loading...</div>
        <div class="info-tables" id="tableInfo">Loading table info...</div>
      </div>

      <div class="welcome-section">
        <h3>👋 Enter Your Name to Get a Greeting!</h3>
        <input
          type="text"
          id="customerName"
          placeholder="Enter your name..."
          onkeypress="if (event.key === 'Enter') greetUser();"
        />
        <button onclick="greetUser()">Greet Me!</button>
        <div
          id="greetingDisplay"
          class="greeting-display"
          style="display: none"
        ></div>
      </div>

      <div class="menu-section">
        <h2>📋 Our Menu</h2>
        <div id="menuGrid" class="menu-grid">
          <!-- Menu items will be populated by JavaScript -->
        </div>
      </div>

      <div class="order-section">
        <h2>🧮 Order Calculator</h2>
        <p>Calculate the total cost for your order:</p>
        <div class="calculator">
          <div>
            <label for="itemPrice">Price per Item ($)</label>
            <input
              type="number"
              id="itemPrice"
              placeholder="10.99"
              step="0.01"
              min="0"
            />
          </div>
          <div>
            <label for="itemQuantity">Quantity</label>
            <input type="number" id="itemQuantity" placeholder="2" min="1" />
          </div>
          <button onclick="calculateOrder()">Calculate Total</button>
        </div>
        <div
          id="calculatorResult"
          class="calculator-result"
          style="display: none"
        ></div>
      </div>

      <div style="text-align: center; margin-top: 30px">
        <a href="AssignmentView.html?assignment=1" class="back-link">
          ← Back to Assignment View
        </a>
      </div>
    </div>

    <script type="module">
      // This will work after building
      let studentCode = null;

      try {
        // Try to import the student's compiled code
        studentCode = await import("./Assignment1.js");
        initializePage();
      } catch (error) {
        console.error("Error loading student code:", error);
        showError();
      }

      function initializePage() {
        // Display restaurant name
        const nameElement = document.getElementById("restaurantName");
        if (studentCode.RestaurantName) {
          nameElement.textContent = "🍽️ " + studentCode.RestaurantName;
        } else {
          nameElement.textContent = "🍽️ [Restaurant Name Not Set]";
        }

        // Display number of tables
        const tableInfo = document.getElementById("tableInfo");
        if (typeof studentCode.NumberOfTables === "number") {
          tableInfo.textContent = `We have ${studentCode.NumberOfTables} tables available`;
        } else {
          tableInfo.textContent = "[Table count not set]";
        }

        // Display restaurant status
        const statusElement = document.getElementById("restaurantStatus");
        if (typeof studentCode.IsOpen === "boolean") {
          if (
            studentCode.isRestaurantOpen &&
            typeof studentCode.isRestaurantOpen === "function"
          ) {
            const statusMessage = studentCode.isRestaurantOpen(
              studentCode.IsOpen,
            );
            statusElement.textContent = statusMessage;
          } else {
            statusElement.textContent = studentCode.IsOpen
              ? "✅ Open"
              : "❌ Closed";
          }
          statusElement.className = `restaurant-status ${studentCode.IsOpen ? "open" : "closed"}`;
        } else {
          statusElement.textContent = "[Status not set]";
        }

        // Display menu items
        const menuGrid = document.getElementById("menuGrid");
        if (
          studentCode.menu &&
          Array.isArray(studentCode.menu) &&
          studentCode.menu.length > 0
        ) {
          menuGrid.innerHTML = "";
          studentCode.menu.forEach((item) => {
            const menuItem = document.createElement("div");
            menuItem.className = "menu-item";
            menuItem.innerHTML = `
              <h3>${item.name || "[No name]"}</h3>
              <div class="menu-item-price">$${(item.price || 0).toFixed(2)}</div>
              ${item.isVegetarian ? '<span class="menu-item-badge">🌱 Vegetarian</span>' : ""}
            `;
            menuGrid.appendChild(menuItem);
          });
        } else {
          menuGrid.innerHTML =
            '<div class="error-message"><p>No menu items found. Make sure to create the menu array!</p></div>';
        }
      }

      function showError() {
        document.body.innerHTML = `
          <div class="menu-container">
            <div class="error-message">
              <h3>⚠️ Assignment Not Compiled Yet</h3>
              <p>To see your restaurant menu in action, you need to:</p>
              <ol style="text-align: left; display: inline-block;">
                <li>Complete the TODOs in <strong>Assignment1.ts</strong></li>
                <li>Run <code>npm run build</code> in your terminal</li>
                <li>Refresh this page</li>
              </ol>
              <p style="margin-top: 20px;">
                <a href="AssignmentView.html?assignment=1" class="back-link">
                  ← Back to Assignment View
                </a>
              </p>
            </div>
          </div>
        `;
      }

      // Greeting function
      window.greetUser = function () {
        const nameInput = document.getElementById("customerName");
        const greetingDisplay = document.getElementById("greetingDisplay");
        const name = nameInput.value.trim();

        if (!name) {
          alert("Please enter your name!");
          return;
        }

        if (
          studentCode &&
          studentCode.greetCustomer &&
          typeof studentCode.greetCustomer === "function"
        ) {
          const greeting = studentCode.greetCustomer(name);
          greetingDisplay.textContent = greeting;
          greetingDisplay.style.display = "block";
        } else {
          greetingDisplay.textContent =
            "❌ greetCustomer function not implemented yet!";
          greetingDisplay.style.display = "block";
        }
      };

      // Calculate order total
      window.calculateOrder = function () {
        const priceInput = document.getElementById("itemPrice");
        const quantityInput = document.getElementById("itemQuantity");
        const resultDisplay = document.getElementById("calculatorResult");

        const price = parseFloat(priceInput.value);
        const quantity = parseInt(quantityInput.value);

        if (isNaN(price) || isNaN(quantity) || price < 0 || quantity < 1) {
          alert("Please enter valid price and quantity!");
          return;
        }

        if (
          studentCode &&
          studentCode.calculateTotal &&
          typeof studentCode.calculateTotal === "function"
        ) {
          const total = studentCode.calculateTotal(price, quantity);
          resultDisplay.textContent = `Total: $${total.toFixed(2)}`;
          resultDisplay.style.display = "block";
        } else {
          resultDisplay.textContent =
            "❌ calculateTotal function not implemented yet!";
          resultDisplay.style.display = "block";
        }
      };
    </script>
  </body>
</html>
